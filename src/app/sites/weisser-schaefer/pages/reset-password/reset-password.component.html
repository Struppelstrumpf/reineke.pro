<div class="ws-card ws-form-wrap">
  @if (success()) {
    <div class="ws-form">
      <h1 class="ws-form__title">Passwort geändert</h1>
      <p class="ws-form__lead">Sie können sich jetzt mit dem neuen Passwort anmelden.</p>
      <button type="button" class="ws-btn" (click)="goLogin()">Zur Anmeldung</button>
    </div>
  } @else {
    <form class="ws-form" (submit)="$event.preventDefault(); submit()">
      <h1 class="ws-form__title">Neues Passwort</h1>

      <div class="ws-field">
        <label for="ws-reset-email">E-Mail</label>
        <input id="ws-reset-email" type="email" [value]="email()" (input)="email.set($any($event.target).value)" />
      </div>
      <div class="ws-field">
        <label for="ws-reset-token">Code aus E-Mail</label>
        <input id="ws-reset-token" type="text" [value]="token()" (input)="token.set($any($event.target).value)" />
      </div>
      <div class="ws-field">
        <label for="ws-reset-password">Neues Passwort</label>
        <input id="ws-reset-password" type="password" [value]="password()" (input)="password.set($any($event.target).value)" />
      </div>

      @if (error()) {
        <p class="ws-form__error" role="alert">{{ error() }}</p>
      }

      <button type="submit" class="ws-btn">Speichern</button>
    </form>
  }
</div>
