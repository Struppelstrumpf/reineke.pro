<div class="ws-card ws-form-wrap">
  <form class="ws-form" (submit)="$event.preventDefault(); submit()">
    <h1 class="ws-form__title">Anmelden</h1>
    <p class="ws-form__lead">Fleischerei-Konto oder Zugang für Inhaber &amp; Mitarbeiter.</p>

    <div class="ws-field">
      <label for="ws-login-email">E-Mail</label>
      <input
        id="ws-login-email"
        type="email"
        autocomplete="username"
        [value]="email()"
        (input)="email.set($any($event.target).value); error.set('')"
      />
    </div>

    <div class="ws-field">
      <label for="ws-login-password">Passwort</label>
      <input
        id="ws-login-password"
        type="password"
        autocomplete="current-password"
        [value]="password()"
        (input)="password.set($any($event.target).value); error.set('')"
      />
    </div>

    @if (error()) {
      <p class="ws-form__error" role="alert">{{ error() }}</p>
    }

    <button type="submit" class="ws-btn">Anmelden</button>

    <section class="ws-demo-login" aria-label="Demo-Zugänge">
      <p class="ws-demo-login__label">Demo testen</p>
      <div class="ws-demo-login__actions">
        <button type="button" class="ws-btn ws-btn--ghost ws-btn--sm" (click)="loginDemo('admin')">
          Admin login
        </button>
        <button type="button" class="ws-btn ws-btn--ghost ws-btn--sm" (click)="loginDemo('customer')">
          Kunde login
        </button>
      </div>
      <p class="ws-demo-login__hint">Testzugänge — nur für die Demo-Vorschau.</p>
    </section>

    <p class="ws-form__foot">
      Noch kein Konto?
      <a class="ws-link" routerLink="/demo/weisser-schaefer/registrieren">Registrieren</a>
    </p>
    <p class="ws-form__foot">
      <a class="ws-link" routerLink="/demo/weisser-schaefer/passwort-vergessen">Passwort vergessen</a>
      <span class="ws-form__hint"> (nur Fleischerei-Konten)</span>
    </p>
  </form>
</div>
