@if (showWelcome()) {
  <div
    class="pv-promo"
    role="dialog"
    aria-modal="true"
    aria-labelledby="pv-promo-title"
    aria-describedby="pv-promo-desc"
    (click)="onBackdropClick($event)"
  >
    <div class="pv-promo__arrow" aria-hidden="true">
      <svg class="pv-promo__arrow-svg" viewBox="0 0 200 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          class="pv-promo__arrow-path"
          d="M8 24 H168 M168 24 L148 10 M168 24 L148 38"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
      <span class="pv-promo__arrow-label">Studio</span>
    </div>

    <div class="pv-promo__copy">
      <p class="pv-promo__eyebrow">Portfolio-Showcase</p>
      <h2 id="pv-promo-title" class="pv-promo__headline">
        <span class="pv-promo__static">Lust auf</span>
        <span class="pv-promo__rotator-slot" aria-live="polite">
          <span class="pv-promo__rotator-measure" aria-hidden="true">{{ rotatorMeasureText }}</span>
          <span
            class="pv-promo__rotator"
            [class.is-exit]="rotatorAnim() === 'exit'"
            [class.is-enter]="rotatorAnim() === 'enter'"
          >
            {{ rotatorWord() }}
          </span>
        </span>
      </h2>
      <p id="pv-promo-desc" class="pv-promo__sub">
        Das hier ist nur die Vorschau — Pakete, Preise und dein Weg zur eigenen Seite warten im
        <strong>Studio</strong> links.
      </p>
      <button type="button" class="pv-promo__dismiss" (click)="dismiss()">
        Demo ansehen
        <span class="pv-promo__dismiss-arrow" aria-hidden="true">→</span>
      </button>
    </div>
  </div>
}
