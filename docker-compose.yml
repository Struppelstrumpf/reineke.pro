# Local or server: docker compose up -d
# Images from GHCR after CI push to main:
#   ghcr.io/struppelstrumpf/reineke.pro:latest
#   ghcr.io/struppelstrumpf/reineke.pro-api:latest

services:
  web:
    build: .
    image: ghcr.io/struppelstrumpf/reineke.pro:latest
    pull_policy: always
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build: ./apps/ws-backend
    image: ghcr.io/struppelstrumpf/reineke.pro-api:latest
    pull_policy: always
    environment:
      WS_DATA_FILE: /data/ws-store.json
      TZ: Europe/Berlin
      NASEBAER_FRONTEND_ORIGIN: https://www.reineke.pro
    volumes:
      - reineke_data:/data
    restart: unless-stopped

volumes:
  reineke_data:
